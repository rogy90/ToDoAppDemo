# =============================================================================
# PYTEST.INI - Pytest Configuration File
# =============================================================================
# This file configures how pytest discovers and runs tests.
# Settings here apply to all test runs automatically.
# =============================================================================

[pytest]
# -----------------------------------------------------------------------------
# Test Discovery Settings
# -----------------------------------------------------------------------------
# Specify where pytest should look for test files
# "tests" means pytest will search the tests/ directory
testpaths = tests

# File patterns that match test files
# "test_*.py" matches files like test_todo.py, test_example.py
python_files = test_*.py

# Function name patterns that match test functions
# "test_*" matches functions like test_add_todo_english()
python_functions = test_*

# -----------------------------------------------------------------------------
# Playwright-specific Settings
# -----------------------------------------------------------------------------
# Enable verbose output to see detailed test progress
addopts = -v

# Default browser to use (chromium, firefox, webkit)
# Can be overridden with: pytest --browser=firefox
# browsers = chromium

# Screenshot settings: on, off, only-on-failure
screenshot = only-on-failure

# Trace settings: on, off, retain-on-failure
# Traces help debug failures by recording browser state
# On failure, traces are saved to test-results/ directory
trace = retain-on-failure

# Video settings: on, off, retain-on-failure
# Records video of test execution for debugging
video = retain-on-failure

# Slow down test execution by specified milliseconds
# Useful for debugging: you can see what's happening
# Example: pytest --slowmo=1000 (1 second delay between actions)
# slowmo = 0

# -----------------------------------------------------------------------------
# Reporting Settings
# -----------------------------------------------------------------------------
# Generate HTML report after test run
# Run with: pytest --html=report.html --self-contained-html
