# =============================================================================
# MYPY.INI - MyPy Configuration File
# =============================================================================
# MyPy is a static type checker for Python.
# This configuration defines type checking strictness and options.
# Reference: https://mypy.readthedocs.io/en/stable/config_file.html
# =============================================================================

# =============================================================================
# GENERAL SETTINGS
# =============================================================================
[mypy]
# Target Python version - enables Python version-specific type checks
# This should match the minimum Python version your project supports
python_version = 3.10

# Warn when a function implicitly returns None (missing return type)
# This helps ensure all functions have explicit return type annotations
warn_return_any = True

# Warn about unused 'mypy.ini' or command-line options
# Helps keep configuration clean and up-to-date
warn_unused_configs = True

# Show error codes in output (helpful for ignoring specific errors)
show_error_codes = True

# Show column numbers in error messages (helps locate exact issue)
show_column_numbers = True

# How to handle imports of third-party packages
# This is needed because playwright types may not be fully installed
ignore_missing_imports = True

# Use color output when running in terminal
color_output = True

# Incremental mode - cache results for faster subsequent runs
incremental = True